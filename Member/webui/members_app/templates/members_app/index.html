<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>联队成员管理 - 可视化编辑</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
    button { cursor: pointer; margin-right: 5px; }
    .add-btn { background-color: #4CAF50; color: white; border: none; padding: 10px 15px; font-size: 16px; margin-bottom: 10px; }
    .edit-btn { background-color: #2196F3; color: white; border: none; padding: 5px 10px; }
    .delete-btn { background-color: #f44336; color: white; border: none; padding: 5px 10px; }
    .modal {
      display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.4); justify-content: center; align-items: center;
    }
    .modal-content {
      background-color: #fefefe; margin: auto; padding: 20px; border: 1px solid #888;
      width: 80%; max-width: 500px; border-radius: 8px;
    }
    .close { float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
    .modal-content label { display: block; margin-top: 10px; }
    .modal-content input, .modal-content select { width: 100%; padding: 5px; margin-top: 2px; }
    .save-btn { background-color: #4CAF50; color: white; border: none; padding: 8px 16px; margin-top: 15px; width: 100%; }
    .error-message { color: red; margin-top: 10px; }
  </style>
</head>
<body>
<h1>联队成员管理</h1>
<button class="add-btn" id="openAddBtn">➕ 新增队员</button>
<table id="memberTable">
  <thead>
    <tr><th>gaijin_id</th><th>name</th><th>state</th><th>join_date</th><th>landforce</th><th>airforce</th><th>navy</th><th>操作</th></tr>
  </thead>
  <tbody id="tableBody">
    <!-- 动态加载数据 -->
  </tbody>
</table>

<!-- 模态框（新增/编辑公用） -->
<div id="memberModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2 id="modalTitle">新增队员</h2>
    <input type="hidden" id="editGaijinId" />
    <label>gaijin_id（唯一，不可修改）</label>
    <input type="text" id="gaijin_id" placeholder="例如: Gaijin123" />
    <label>姓名</label>
    <input type="text" id="name" />
    <label>状态 (N/F/C)</label>
    <select id="state">
      <option value="N">N - 新兵</option>
      <option value="F">F - 正式</option>
      <option value="C">C - 指挥官</option>
    </select>
    <label>入队日期</label>
    <input type="date" id="join_date" />
    <label>陆军资质</label>
    <select id="landforce">
      <option value="Uncertified">Uncertified</option>
      <option value="Certified">Certified</option>
    </select>
    <label>空军资质</label>
    <select id="airforce">
      <option value="Uncertified">Uncertified</option>
      <option value="Certified">Certified</option>
    </select>
    <label>海军资质</label>
    <select id="navy">
      <option value="Uncertified">Uncertified</option>
      <option value="Certified">Certified</option>
    </select>
    <div id="modalError" class="error-message"></div>
    <button class="save-btn" id="saveBtn">保存</button>
  </div>
</div>

<script>
  // 获取DOM元素
  const tableBody = document.getElementById('tableBody');
  const modal = document.getElementById('memberModal');
  const modalTitle = document.getElementById('modalTitle');
  const closeSpan = document.getElementsByClassName('close')[0];
  const saveBtn = document.getElementById('saveBtn');
  const modalError = document.getElementById('modalError');
  
  // 表单字段
  const editGaijinIdField = document.getElementById('editGaijinId');
  const gaijinIdField = document.getElementById('gaijin_id');
  const nameField = document.getElementById('name');
  const stateField = document.getElementById('state');
  const joinDateField = document.getElementById('join_date');
  const landforceField = document.getElementById('landforce');
  const airforceField = document.getElementById('airforce');
  const navyField = document.getElementById('navy');

  let currentMode = 'add'; // 'add' 或 'edit'

  // 获取CSRF Token（Django必需）
  function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
      const cookies = document.cookie.split(';');
      for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i].trim();
        if (cookie.substring(0, name.length + 1) === (name + '=')) {
          cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
          break;
        }
      }
    }
    return cookieValue;
  }
  const csrftoken = getCookie('csrftoken');

  // 加载并刷新表格
  async function loadMembers() {
    try {
      const response = await fetch('/api/members/');
      const members = await response.json();
      tableBody.innerHTML = '';
      members.forEach(m => {
        const row = tableBody.insertRow();
        row.insertCell(0).innerText = m.gaijin_id;
        row.insertCell(1).innerText = m.name;
        row.insertCell(2).innerText = m.state;
        row.insertCell(3).innerText = m.join_date;
        row.insertCell(4).innerText = m.landforce;
        row.insertCell(5).innerText = m.airforce;
        row.insertCell(6).innerText = m.navy;
        const actionCell = row.insertCell(7);
        actionCell.innerHTML = `
          <button class="edit-btn" data-id="${m.gaijin_id}">编辑</button>
          <button class="delete-btn" data-id="${m.gaijin_id}">删除</button>
        `;
      });
      // 绑定编辑和删除事件
      document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', () => openEditModal(btn.getAttribute('data-id')));
      });
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteMember(btn.getAttribute('data-id')));
      });
    } catch (err) {
      console.error('加载数据失败', err);
    }
  }

  // 打开新增模态框
  function openAddModal() {
    currentMode = 'add';
    modalTitle.innerText = '新增队员';
    editGaijinIdField.value = '';
    gaijinIdField.value = '';
    nameField.value = '';
    stateField.value = 'N';
    joinDateField.value = '';
    landforceField.value = 'Uncertified';
    airforceField.value = 'Uncertified';
    navyField.value = 'Uncertified';
    gaijinIdField.disabled = false;   // 新增时可输入
    modalError.innerText = '';
    modal.style.display = 'flex';
  }

  // 打开编辑模态框
  async function openEditModal(gaijinId) {
    try {
      const response = await fetch('/api/members/');
      const members = await response.json();
      const member = members.find(m => m.gaijin_id === gaijinId);
      if (!member) throw new Error('成员不存在');
      currentMode = 'edit';
      modalTitle.innerText = '编辑队员';
      editGaijinIdField.value = member.gaijin_id;
      gaijinIdField.value = member.gaijin_id;
      nameField.value = member.name;
      stateField.value = member.state;
      joinDateField.value = member.join_date;
      landforceField.value = member.landforce;
      airforceField.value = member.airforce;
      navyField.value = member.navy;
      gaijinIdField.disabled = true;   // 编辑时不可修改ID
      modalError.innerText = '';
      modal.style.display = 'flex';
    } catch (err) {
      alert('获取成员信息失败: ' + err.message);
    }
  }

  // 保存（新增或更新）
  async function saveMember() {
    modalError.innerText = '';
    const data = {
      name: nameField.value.trim(),
      state: stateField.value,
      join_date: joinDateField.value,
      landforce: landforceField.value,
      airforce: airforceField.value,
      navy: navyField.value,
    };
    if (currentMode === 'add') {
      const gaijinId = gaijinIdField.value.trim();
      if (!gaijinId) {
        modalError.innerText = 'gaijin_id 不能为空';
        return;
      }
      data.gaijin_id = gaijinId;
      try {
        const response = await fetch('/api/members/add/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrftoken },
          body: JSON.stringify(data)
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || '新增失败');
        modal.style.display = 'none';
        loadMembers();
      } catch (err) {
        modalError.innerText = err.message;
      }
    } else { // edit
      const gaijinId = editGaijinIdField.value;
      try {
        const response = await fetch(`/api/members/${gaijinId}/update/`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrftoken },
          body: JSON.stringify(data)
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || '更新失败');
        modal.style.display = 'none';
        loadMembers();
      } catch (err) {
        modalError.innerText = err.message;
      }
    }
  }

  // 删除成员
  async function deleteMember(gaijinId) {
    if (!confirm(`确定要删除 gaijin_id 为 ${gaijinId} 的成员吗？`)) return;
    try {
      const response = await fetch(`/api/members/${gaijinId}/delete/`, {
        method: 'DELETE',
        headers: { 'X-CSRFToken': csrftoken }
      });
      const result = await response.json();
      if (!response.ok) throw new Error(result.error || '删除失败');
      loadMembers();
    } catch (err) {
      alert('删除失败: ' + err.message);
    }
  }

  // 关闭模态框
  closeSpan.onclick = () => modal.style.display = 'none';
  window.onclick = (event) => { if (event.target === modal) modal.style.display = 'none'; };

  // 绑定新增按钮事件
  document.getElementById('openAddBtn').addEventListener('click', openAddModal);
  saveBtn.addEventListener('click', saveMember);

  // 页面加载时获取数据
  loadMembers();
</script>
</body>
</html>
