<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Member List</title>
    <style>
      table {border-collapse: collapse; width: 100%;}
      th, td {border: 1px solid #ccc; padding: 8px;}
    </style>
  </head>
  <body>
    <h1>Members</h1>
    <table>
      <thead>
        <tr><th>gaijin_id</th><th>name</th><th>state</th><th>join_date</th><th>landforce</th><th>airforce</th><th>navy</th></tr>
      </thead>
      <tbody>
      {% for m in members %}
        <tr>
          <td>{{ m.gaijin_id }}</td>
          <td>{{ m.name }}</td>
          <td>{{ m.state }}</td>
          <td>{{ m.join_date }}</td>
          <td>{{ m.landforce }}</td>
          <td>{{ m.airforce }}</td>
          <td>{{ m.navy }}</td>
        </tr>
      {% empty %}
        <tr><td colspan="7">No members found.</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </body>
</html>
